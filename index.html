<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для тебя 💌</title>

<style>
body {
    
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ffe4ec, #fff8f5);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    position: relative;
}

/* Заголовок */
h1 {
    position: absolute;
    top: 12%;
    color: #d63384;
    font-weight: 500;
    text-align: center;
}

/* Конверт */
.envelope {
    position: relative;
    width: 320px;   /* больше */
    height: 200px;  /* больше */
    background: #ffb6c1;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.3s ease;
}

.envelope:hover {
    transform: scale(1.03);
}

.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ff8fab;
    clip-path: polygon(0 0, 50% 60%, 100% 0);
    transform-origin: top;
    transition: transform 0.6s ease;
    z-index: 2;
}

/* Письмо */
.letter {
    position: absolute;
    bottom: 15px;
    left: 15px;
    right: 15px;
    top: 35px;
    background: white;
    border-radius: 8px;
    padding: 18px;
    box-sizing: border-box;
    font-size: 13px;  /* меньше */
    line-height: 1.5;
    opacity: 0;
    transition: opacity 0.6s ease 0.4s;
    z-index: 1;
    overflow: hidden; /* чтобы ничего не вылезало */
}

.open .flap {
    transform: rotateX(180deg);
}

.open .letter {
    opacity: 1;
}

.final {
    opacity: 0;
    transition: opacity 1s ease;
    margin-top: 10px;
    font-weight: 500;
}

/* Лепестки */
.petal {
    position: fixed;      /* важно! */
    top: -50px;           /* 👈 сразу выше экрана */
    width: 14px;
    height: 14px;
    background: #ff8fab;
    border-radius: 50% 50% 50% 0;
    transform: rotate(45deg);
    opacity: 0.7;
    pointer-events: none;

    animation: fall linear infinite;
}

@keyframes fall {
    0% {
        transform: translateY(-40vh) translateX(0px) rotate(0deg);
    }

    25% {
        transform: translateY(25vh) translateX(-20px) rotate(90deg);
    }

    50% {
        transform: translateY(55vh) translateX(20px) rotate(180deg);
    }

    75% {
        transform: translateY(85vh) translateX(-15px) rotate(270deg);
    }

    100% {
        transform: translateY(120vh) translateX(15px) rotate(360deg);
    }
}

/* Мобильная адаптация */
@media (max-width: 500px) {
    .envelope {
        width: 270px;
        height: 180px;
    }

    .letter {
        font-size: 11px;
        top: 15px;
    }

    h1 {
        font-size: 25px;
        top: 5%;
        padding: 0 20px;
    }
}
.line {
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.6s ease;
    margin-bottom: 5px;
}

.line.show {
    opacity: 1;
    transform: translateY(0);
}
.seal-text {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    color: white;
    font-weight: 500;
    opacity: 0;
    transition: opacity 1.2s ease;
    z-index: 3;
    pointer-events: none;
}

.seal-text.show {
    opacity: 1;
}
#openTitle {
    transition: opacity 0.8s ease;
}

#openTitle.hide {
    opacity: 0;
}
</style>
</head>

<body>

<h1 id="openTitle">Открой конверт 💌</h1>

<div class="envelope" onclick="openEnvelope(this)">
    <div class="flap"></div>
    <div class="letter">
    <div class="line">9 лет назад мы просто пошли в одну школу.</div>
    <div class="line">А сейчас я почему-то всегда жду, когда увижу тебя.</div>
    <div class="line">Мне с тобой слишком хорошо, чтобы делать вид, что это просто дружба.</div>
	</div>
    </div>
</div>
 <div class="seal-text" id="sealText">
        С 8 марта 💝
    </div>
</div>
<script>
function openEnvelope(el){

    // скрываем надпись
    document.getElementById("openTitle").classList.add("hide");

    el.classList.add("open");

    const lines = document.querySelectorAll(".line");

    lines.forEach((line, index) => {
        setTimeout(() => {
            line.classList.add("show");
        }, 3000 * (index + 1));
    });

    // 3 строки = 9 сек + 3 сек пауза
    setTimeout(() => {
        el.classList.remove("open");
    }, 12000);

    setTimeout(() => {
        document.getElementById("sealText").classList.add("show");
    }, 12800);
}

/* Генерация лепестков */
for(let i = 0; i < 25; i++){
    const petal = document.createElement("div");
    petal.classList.add("petal");

    petal.style.left = Math.random() * 100 + "vw";

    // случайная скорость падения
    petal.style.animationDuration = (7 + Math.random() * 5) + "s";

    // случайная задержка
    petal.style.animationDelay = Math.random() * 10 + "s";

    // случайная прозрачность
    petal.style.opacity = 0.5 + Math.random() * 0.5;

    document.body.appendChild(petal);
}

</script>

</body>
</html>
